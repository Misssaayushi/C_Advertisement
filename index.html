<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Unavailable</title>
    <style>
        :root {
            --primary-bg: #1a1a2e;
            --gradient-start: #2e1065;
            --gradient-end: #1e3a8a;
            --card-bg: rgba(255, 255, 255, 0.08);
            --text-main: #f8f9fa;
            --text-muted: #adb5bd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow: hidden;
            padding: 24px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 48px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .icon {
            font-size: 56px;
            margin-bottom: 24px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2));
            user-select: none;
            cursor: pointer;
            /* Acts as the hidden trigger */
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 16px;
            line-height: 1.3;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 16px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 0;
        }

        /* Developer Console - Hidden by default */
        .dev-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            z-index: 100;
        }

        .dev-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .dev-modal {
            background: #1e1e1e;
            padding: 32px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .dev-overlay.active .dev-modal {
            transform: translateY(0);
        }

        .dev-modal h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #fff;
        }

        .dev-input-group {
            position: relative;
        }

        #dev-password {
            background: #2d2d2d;
            border: 1px solid #404040;
            padding: 12px 16px;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            width: 250px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #dev-password:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
        }

        .error-shake {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
            border-color: #ef4444 !important;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        @media (max-width: 600px) {
            .card {
                padding: 36px 24px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="icon" id="trigger-icon" title="Server Status: Locked">🔒</div>
        <h1>Website Temporarily Unavailable</h1>
        <p>This website is currently unavailable due to pending payment. Please contact the developer to restore access.
        </p>
    </div>

    <!-- Developer Override Modal -->
    <div class="dev-overlay" id="dev-overlay">
        <div class="dev-modal">
            <h2>Developer Override</h2>
            <div class="dev-input-group">
                <input type="password" id="dev-password" placeholder="Enter override password" autocomplete="off">
            </div>
        </div>
    </div>

    <script>
        // Setup developer backdoor
        const triggerIcon = document.getElementById('trigger-icon');
        const devOverlay = document.getElementById('dev-overlay');
        const devPassword = document.getElementById('dev-password');

        let clickCount = 0;
        let clickTimer;

        // Triple click on the lock icon opens the password prompt
        triggerIcon.addEventListener('click', () => {
            clickCount++;
            clearTimeout(clickTimer);

            if (clickCount === 3) {
                devOverlay.classList.add('active');
                setTimeout(() => devPassword.focus(), 100);
                clickCount = 0;
            } else {
                clickTimer = setTimeout(() => {
                    clickCount = 0;
                }, 400);
            }
        });

        // Close modal on escape or clicking outside
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && devOverlay.classList.contains('active')) {
                closeDevModal();
            }
        });

        devOverlay.addEventListener('click', (e) => {
            if (e.target === devOverlay) {
                closeDevModal();
            }
        });

        function closeDevModal() {
            devOverlay.classList.remove('active');
            devPassword.value = '';
        }

        // Handle password submission
        devPassword.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                const val = devPassword.value;
                // Simple hardcoded dev password 'admin'
                if (val === 'admin') {
                    // Redirect to the original site which we assume is main.html
                    window.location.href = 'main.html';
                } else {
                    devPassword.classList.add('error-shake');
                    setTimeout(() => {
                        devPassword.classList.remove('error-shake');
                    }, 400);
                }
            }
        });
    </script>
</body>

</html>
